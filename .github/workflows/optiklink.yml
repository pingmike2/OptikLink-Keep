name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 19 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # =========================
      # 📥 拉取私库（仅用于运行脚本）
      # =========================
      - name: 📥 Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/OptikLink-Keep-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          fetch-depth: 1

      # =========================
      # 🟢 Node.js
      # =========================
      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # =========================
      # 📦 安装依赖
      # =========================
      - name: 📦 安装依赖
        working-directory: private
        run: npm install

      # =========================
      # 🌐 安装 Playwright
      # =========================
      - name: 🌐 安装 Playwright 浏览器
        working-directory: private
        run: npx playwright install chromium --with-deps

      # =========================
      # 🛡️ 启动 GOST
      # =========================
      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')

          echo "📦 GOST 版本: $VERSION"

          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"

          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"

          chmod +x gost

          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &

          sleep 3

          echo "✅ GOST 已启动，测试连通性..."

          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      # =========================
      # 🚀 执行 Playwright
      # =========================
      - name: 🚀 运行保活脚本
        working-directory: private
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      # =========================
      # 📥 再拉取当前工作仓库
      # =========================
      - name: 📥 Checkout Current Repo
        uses: actions/checkout@v4
        with:
          path: current
          fetch-depth: 0

      # =========================
      # 🕒 更新时间文件并提交
      # =========================
      - name: 🕒 更新 time.txt 并提交到当前仓库
        working-directory: current
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 同步远程仓库
          git fetch origin main
          git reset --hard origin/main

          # 更新时间
          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          # 有变化才提交
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"

            # Push 自动重试
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                echo "✅ Push 成功"
                break
              fi

              echo "⚠️ Push 失败，尝试重新同步..."

              git fetch origin main
              git rebase origin/main

              sleep 3
            done
          fi

      # =========================
      # 📸 上传失败截图
      # =========================
      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: private/test-results/
          retention-days: 7